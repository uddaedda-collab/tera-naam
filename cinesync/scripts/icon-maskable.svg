<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a0f44"/>
      <stop offset="0.55" stop-color="#160a26"/>
      <stop offset="1" stop-color="#0a0011"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff4d8d"/>
      <stop offset="0.55" stop-color="#9b5cff"/>
      <stop offset="1" stop-color="#5cc8ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#ff4d8d" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ff4d8d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- full-bleed background for maskable safe zone -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="240" r="170" fill="url(#glow)"/>

  <!-- scaled-down content within ~80% safe zone -->
  <g transform="translate(256,248) scale(0.72) translate(-256,-224)">
    <circle cx="256" cy="224" r="120" fill="none" stroke="url(#grad)" stroke-width="16" opacity="0.9"/>
    <path d="M223 168 L320 224 L223 280 Z" fill="url(#grad)"/>
    <path d="M256 420
             c-8 -8 -70 -52 -96 -92
             c-22 -34 -2 -78 38 -78
             c24 0 42 16 58 38
             c16 -22 34 -38 58 -38
             c40 0 60 44 38 78
             c-26 40 -88 84 -96 92 z"
          fill="url(#grad)"/>
  </g>
</svg>
