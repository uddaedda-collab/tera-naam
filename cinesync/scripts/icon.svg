<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a0f44"/>
      <stop offset="0.55" stop-color="#160a26"/>
      <stop offset="1" stop-color="#0a0011"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff4d8d"/>
      <stop offset="0.55" stop-color="#9b5cff"/>
      <stop offset="1" stop-color="#5cc8ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#ff4d8d" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff4d8d" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="214" r="220" fill="url(#glow)"/>

  <!-- play button ring -->
  <circle cx="256" cy="224" r="120" fill="none" stroke="url(#grad)" stroke-width="16" opacity="0.9"/>
  <!-- play triangle -->
  <path d="M223 168 L320 224 L223 280 Z" fill="url(#grad)"/>

  <!-- heart -->
  <path d="M256 420
           c-8 -8 -70 -52 -96 -92
           c-22 -34 -2 -78 38 -78
           c24 0 42 16 58 38
           c16 -22 34 -38 58 -38
           c40 0 60 44 38 78
           c-26 40 -88 84 -96 92 z"
        fill="url(#grad)"/>
</svg>
